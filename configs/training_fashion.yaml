# Training config for fashion dataset on RTX 4060 (8GB VRAM)
model_name: "Qwen/Qwen3-VL-2B-Instruct"
load_in_4bit: true

# LoRA parameters
lora_r: 16
lora_alpha: 32
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training hyperparameters (conservative for 8GB VRAM)
epochs: 3
batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
warmup_steps: 50
gradient_checkpointing: "unsloth"

# Evaluation & checkpointing
eval_steps: 200
save_steps: 200
early_stopping_patience: 3

# Output
output_dir: "models/fashion-qwen3vl-2b"
merge_on_export: false  # save VRAM — merge later if needed
run_name: "fashion-v1"

# Logging
use_wandb: false
